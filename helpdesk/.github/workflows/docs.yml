name: Generate Entity Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/HelpdeskAPI/Entities/**'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet tool install -g docfx
      - name: Generate docfx.json (si no existe)
        run: |
          if [ ! -f docfx.json ]; then
            docfx init -q
            # Modificar docfx.json para que apunte a Entities
            sed -i 's|"src": \[\]|"src": [{ "files": ["backend/HelpdeskAPI/Entities/**/*.cs"], "exclude": ["**/obj/**", "**/bin/**"] }]|' docfx.json
          fi
      - name: Build documentation
        run: docfx docfx.json --output docs/entity-docs
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/entity-docs
          destination_dir: ./docs